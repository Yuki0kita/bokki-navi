# バイアグラなび nginx設定
# Nginx 1.18+ / Ubuntu 22.04 LTS 対応
# 配置先: /etc/nginx/sites-available/viagranavi.conf

server {
    listen 80;
    server_name example.com www.example.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name example.com www.example.com;
    root /var/www/viagranavi;
    index index.html;

    # ━━━ SSL ━━━
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ━━━ セキュリティヘッダー ━━━
    # CSP: Google Fonts・A8.netのみ許可、インラインスクリプトはnonce推奨
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ━━━ Gzip圧縮 ━━━
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/html
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ━━━ キャッシュ制御 ━━━
    # HTMLは短期（更新頻度を考慮）
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400";
        add_header Vary "Accept-Encoding";
    }

    # CSSは長期（ファイル名ハッシュがない場合は控えめに）
    location ~* \.css$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # フォント・画像は長期
    location ~* \.(woff2?|ttf|eot|png|jpg|jpeg|webp|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # ━━━ レート制限 ━━━
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/m;
    limit_req zone=general burst=10 nodelay;

    # ━━━ ルーティング ━━━
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # 404ページ
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # ━━━ セキュリティ: 不審なリクエストブロック ━━━
    # .envや設定ファイルへのアクセスブロック
    location ~* \.(env|git|htaccess|htpasswd|ini|log|sh|sql|bak)$ {
        deny all;
        return 404;
    }

    # ━━━ アクセスログ ━━━
    access_log /var/log/nginx/viagranavi_access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/viagranavi_error.log warn;

    # ━━━ バッファ最適化 ━━━
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 1m;
}
